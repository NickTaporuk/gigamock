path: "/internal/mqtt/devices/:deviceID/telemetry"
method: POST
type: mqtt
description: "MQTT mock scenario for publishing device telemetry"
scenarios:
  - name: "publish temperature telemetry"
    broker: "tcp://localhost:1883"
    clientID: "gigamock-device-telemetry"
    topic: "devices/device-1/telemetry"
    qos: 1
    retained: false
    message:
      contentType: "application/json"
      body: |
        {
          "deviceId": "device-1",
          "temperature": 21.7,
          "humidity": 42.5
        }

  - name: "publish device offline"
    broker: "tcp://localhost:1883"
    clientID: "gigamock-device-status"
    topic: "devices/device-1/status"
    qos: 1
    retained: true
    message:
      contentType: "application/json"
      body: |
        {
          "deviceId": "device-1",
          "status": "OFFLINE"
        }
