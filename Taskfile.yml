version: "3"

vars:
  BIN_DIR: '{{default "bin" .BIN_DIR}}'
  BINARY_NAME: '{{default "gigamock" .BINARY_NAME}}'
  PORT: '{{default "7777" .PORT}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:
    desc: Run Go tests
    cmds:
      - go test ./...

  build:
    desc: Build Gigamock binary into ./bin
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/{{.BINARY_NAME}} ./cmd

  install:local:
    desc: Build Gigamock binary into ./bin
    cmds:
      - task: build

  help:
    desc: Show Gigamock CLI help
    cmds:
      - go run ./cmd --help

  run:all:
    desc: Run Gigamock with all example scenario types
    cmds:
      - >-
        go run ./cmd
        --server-port :{{.PORT}}
        --dir-path ./examples/rest
        --dir-path ./examples/graphql
        --dir-path ./examples/grpc
        --dir-path ./examples/kafka
        --dir-path ./examples/nats
        --dir-path ./examples/rabbitmq
        --dir-path ./examples/mqtt
        --dir-path ./examples/websocket
        --dir-path ./examples/s3
        --dir-path ./examples/sqs
        --dir-path ./examples/sns
        --dir-path ./examples/pubsub
        --dir-path ./examples/azure-servicebus
        --dir-path ./examples/soap

  run:examples:
    desc: Run Gigamock with the full examples directory
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples

  run:http:
    desc: Run HTTP examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/rest

  run:graphql:
    desc: Run GraphQL examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/graphql

  run:grpc:
    desc: Run real gRPC examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --grpc-server-port :7778 --dir-path ./examples/grpc

  run:kafka:
    desc: Run Kafka examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/kafka

  run:nats:
    desc: Run NATS contract examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/nats

  run:rabbitmq:
    desc: Run RabbitMQ contract examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/rabbitmq

  run:mqtt:
    desc: Run MQTT contract examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/mqtt

  run:websocket:
    desc: Run WebSocket examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/websocket

  run:s3:
    desc: Run S3-compatible examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/s3

  run:sqs:
    desc: Run SQS-compatible examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/sqs

  run:sns:
    desc: Run SNS-compatible examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/sns

  run:pubsub:
    desc: Run Google Pub/Sub-compatible examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/pubsub

  run:servicebus:
    desc: Run Azure Service Bus-compatible examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/azure-servicebus

  run:soap:
    desc: Run SOAP examples
    cmds:
      - go run ./cmd --server-port :{{.PORT}} --dir-path ./examples/soap

  docker:build:all:
    desc: Build Docker images for all scenario types
    cmds:
      - task: docker:build:http
      - task: docker:build:graphql
      - task: docker:build:grpc
      - task: docker:build:kafka
      - task: docker:build:nats
      - task: docker:build:rabbitmq
      - task: docker:build:mqtt
      - task: docker:build:websocket
      - task: docker:build:s3
      - task: docker:build:sqs
      - task: docker:build:sns
      - task: docker:build:pubsub
      - task: docker:build:servicebus
      - task: docker:build:soap

  docker:build:http:
    desc: Build HTTP Docker image
    cmds:
      - docker build -f deployment/docker/types/http/Dockerfile -t gigamock-http .

  docker:build:graphql:
    desc: Build GraphQL Docker image
    cmds:
      - docker build -f deployment/docker/types/graphql/Dockerfile -t gigamock-graphql .

  docker:build:grpc:
    desc: Build gRPC Docker image
    cmds:
      - docker build -f deployment/docker/types/grpc/Dockerfile -t gigamock-grpc .

  docker:build:kafka:
    desc: Build Kafka Docker image
    cmds:
      - docker build -f deployment/docker/types/kafka/Dockerfile -t gigamock-kafka .

  docker:build:nats:
    desc: Build NATS Docker image
    cmds:
      - docker build -f deployment/docker/types/nats/Dockerfile -t gigamock-nats .

  docker:build:rabbitmq:
    desc: Build RabbitMQ Docker image
    cmds:
      - docker build -f deployment/docker/types/rabbitmq/Dockerfile -t gigamock-rabbitmq .

  docker:build:mqtt:
    desc: Build MQTT Docker image
    cmds:
      - docker build -f deployment/docker/types/mqtt/Dockerfile -t gigamock-mqtt .

  docker:build:websocket:
    desc: Build WebSocket Docker image
    cmds:
      - docker build -f deployment/docker/types/websocket/Dockerfile -t gigamock-websocket .

  docker:build:s3:
    desc: Build S3 Docker image
    cmds:
      - docker build -f deployment/docker/types/s3/Dockerfile -t gigamock-s3 .

  docker:build:sqs:
    desc: Build SQS Docker image
    cmds:
      - docker build -f deployment/docker/types/sqs/Dockerfile -t gigamock-sqs .

  docker:build:sns:
    desc: Build SNS Docker image
    cmds:
      - docker build -f deployment/docker/types/sns/Dockerfile -t gigamock-sns .

  docker:build:pubsub:
    desc: Build Google Pub/Sub Docker image
    cmds:
      - docker build -f deployment/docker/types/pubsub/Dockerfile -t gigamock-pubsub .

  docker:build:servicebus:
    desc: Build Azure Service Bus Docker image
    cmds:
      - docker build -f deployment/docker/types/azure-servicebus/Dockerfile -t gigamock-servicebus .

  docker:build:soap:
    desc: Build SOAP Docker image
    cmds:
      - docker build -f deployment/docker/types/soap/Dockerfile -t gigamock-soap .

  docker:run:http:
    desc: Run HTTP Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-http

  docker:run:graphql:
    desc: Run GraphQL Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-graphql

  docker:run:grpc:
    desc: Run gRPC Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 -p 7778:7778 gigamock-grpc

  docker:run:kafka:
    desc: Run Kafka Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-kafka

  docker:kafka:up:
    desc: Run Kafka broker and Gigamock Kafka example stack
    cmds:
      - GIGAMOCK_HTTP_PORT={{.PORT}} docker compose -f deployment/docker/example/docker-compose.yaml up --build

  docker:kafka:down:
    desc: Stop Kafka broker and Gigamock Kafka example stack
    cmds:
      - GIGAMOCK_HTTP_PORT={{.PORT}} docker compose -f deployment/docker/example/docker-compose.yaml down -v

  docker:kafka:test:
    desc: Call the docker-compose Kafka example endpoint and metrics
    cmds:
      - curl -sS http://localhost:{{.PORT}}/internal/kafka/docker/message-1
      - curl -sS http://localhost:{{.PORT}}/internal/v1/kafka/metrics

  docker:run:nats:
    desc: Run NATS Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-nats

  docker:run:rabbitmq:
    desc: Run RabbitMQ Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-rabbitmq

  docker:run:mqtt:
    desc: Run MQTT Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-mqtt

  docker:run:websocket:
    desc: Run WebSocket Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-websocket

  docker:run:s3:
    desc: Run S3 Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-s3

  docker:run:sqs:
    desc: Run SQS Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-sqs

  docker:run:sns:
    desc: Run SNS Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-sns

  docker:run:pubsub:
    desc: Run Google Pub/Sub Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-pubsub

  docker:run:servicebus:
    desc: Run Azure Service Bus Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-servicebus

  docker:run:soap:
    desc: Run SOAP Docker image
    cmds:
      - docker run --rm -p {{.PORT}}:7777 gigamock-soap

  features:list:
    desc: List Gherkin feature files
    cmds:
      - find features -name "*.feature" -maxdepth 1 -type f | sort
