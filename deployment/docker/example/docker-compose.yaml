services:
  kafka:
    image: apache/kafka:3.7.0
    env_file:
      - kafka/kafka-variables.env
    ports:
      - "9092:9092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  gigamock-kafka:
    build:
      context: ../../..
      dockerfile: deployment/docker/types/kafka/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${GIGAMOCK_HTTP_PORT:-7777}:7777"
